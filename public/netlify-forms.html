<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Netlify Forms</title>
</head>

<body>
    <form name="booking" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="booking" />
        <input name="bot-field" />

        <input name="vehicle" />
        <input name="name" />
        <input name="phone" />
        <input name="email" />
        <input name="pickup-datetime" />
        <input name="return-datetime" />
        <input name="pickup-location" />
        <textarea name="notes"></textarea>
    </form>
</body>

</html>
